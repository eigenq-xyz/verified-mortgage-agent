name: CI

on:
  push:
    branches: ["main", "phase-*"]
  pull_request:
    branches: ["main"]

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Unit tests
        run: uv run pytest -m "not integration" --cov=src --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  lean:
    name: Lean 4 build and verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lean / elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Lean packages
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: lean-${{ hashFiles('lean/lean-toolchain') }}

      - name: Build Lean verifier
        run: |
          cd lean
          lake build MortgageVerifier
          lake build verify-trace

      - name: Smoke test — valid record passes
        run: |
          cd lean
          lake exe verify-trace ../tests/fixtures/sample_record_valid.json
          echo "Exit code: $?"

      - name: Smoke test — DTI violation is detected
        run: |
          cd lean
          set +e
          lake exe verify-trace ../tests/fixtures/sample_record_dti_violation.json
          code=$?
          set -e
          [ "$code" -eq 1 ] && echo "PASS: violation correctly detected" || \
            { echo "FAIL: expected exit code 1, got $code"; exit 1; }

  integration:
    name: Integration tests (Lean binary + live LLM)
    runs-on: ubuntu-latest
    needs: [python, lean]
    if: github.ref == 'refs/heads/main'
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Lean / elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build Lean verifier
        run: cd lean && lake build verify-trace

      - name: Run integration tests
        run: uv run pytest -m integration -q
